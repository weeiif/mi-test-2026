<!DOCTYPE html>
<html lang="es" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Oposiciones 2026 - Privado</title>
    <style>
        :root { --bg: #ffffff; --accent: #4477ff; --dark: #000; --success: #22c55e; --error: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; margin: 0; padding: 20px; text-align: center; }
        h1 { font-size: 24px; font-weight: 900; margin-bottom: 20px; text-transform: uppercase; border-bottom: 4px solid #000; display: inline-block; padding: 0 10px; }
        .container { max-width: 500px; margin: auto; }
        
        /* LOGIN */
        .login-card { background: white; border: 4px solid #000; padding: 30px; border-radius: 20px; box-shadow: 10px 10px 0 #000; margin-top: 50px; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border: 3px solid #000; border-radius: 10px; font-weight: bold; box-sizing: border-box; font-size: 16px; }

        /* BOTONES */
        .btn-tema { background: #fff; color: #000; border: 3px solid #000; padding: 18px; border-radius: 50px; width: 100%; font-weight: 800; cursor: pointer; margin-bottom: 15px; box-shadow: 0 5px 0 #000; display: flex; justify-content: space-between; align-items: center; text-transform: uppercase; transition: 0.2s; }
        .btn-tema:active { transform: translateY(4px); box-shadow: none; }
        
        .btn-test { background: #4477ff; color: white; border: 3px solid #000; padding: 20px; border-radius: 15px; font-weight: 900; cursor: pointer; box-shadow: 4px 4px 0 #000; width: 100%; }
        .test-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }

        /* EXAMEN */
        .card { border: 3px solid #000; border-radius: 20px; padding: 20px; box-shadow: 8px 8px 0 #000; background: #fff; text-align: left; margin-top: 20px; }
        .pregunta-texto { background: #bae6fd; padding: 15px; border-radius: 10px; border: 2px solid #000; font-weight: 700; margin-bottom: 20px; }
        .opcion { border: 2px solid #000; padding: 12px; border-radius: 10px; margin-bottom: 10px; cursor: pointer; font-weight: 600; }
        .correcta { background: var(--success) !important; color: white; }
        .error { background: var(--error) !important; color: white; }
        .btn-nav { background: #000; color: #fff; padding: 12px 25px; border-radius: 12px; border: none; font-weight: bold; display: none; cursor: pointer; }
        .btn-volver { background: #ff9800; color: white; border: 3px solid #000; padding: 8px 15px; border-radius: 50px; cursor: pointer; font-weight: bold; margin-bottom: 20px; display: inline-block; }
    </style>
</head>
<body>
    <div class="container" id="app"></div>

    <script src="preguntas.js"></script>
    <script src="psicos.js"></script>

    <script>
        let testActual = []; let falladas = []; let aciertos = 0; let indexPregunta = 0;
        let fuenteActual = null; let ultimoTemaId = null; let ultimoTestIdx = null;
        
        // SISTEMA DE USUARIOS
        let usuarioActual = localStorage.getItem('user_2026');

        function login() {
            const u = document.getElementById('u').value.toLowerCase().trim();
            const p = document.getElementById('p').value;

            // --- CONFIGURA AQUÍ TUS USUARIOS ---
            const autorizados = {
                "admin": "1234",      // Tu usuario
                "amigo": "5678"       // Usuario de tu amigo
            };

            if (autorizados[u] && autorizados[u] === p) {
                localStorage.setItem('user_2026', u);
                usuarioActual = u;
                renderInicio();
            } else {
                alert("Datos incorrectos");
            }
        }

        function cerrarSesion() {
            localStorage.removeItem('user_2026');
            location.reload();
        }

        function renderInicio() {
            const app = document.getElementById('app');
            if (!usuarioActual) {
                app.innerHTML = `
                    <div class="login-card">
                        <h1>🔒 ACCESO</h1>
                        <input type="text" id="u" placeholder="USUARIO">
                        <input type="password" id="p" placeholder="CONTRASEÑA">
                        <button class="btn-test" onclick="login()">ENTRAR</button>
                    </div>`;
                return;
            }

            app.innerHTML = `
                <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:12px; font-weight:bold;">
                    <span>HOLA: ${usuarioActual.toUpperCase()}</span>
                    <span onclick="cerrarSesion()" style="color:red; cursor:pointer;">CERRAR SESIÓN</span>
                </div>
                <h1>Oposiciones 2026</h1>
                <button class="btn-tema" style="background:#facc15;" onclick="renderMenuSeccion('teoria')">📚 TEORÍA</button>
                <button class="btn-tema" style="background:#4477ff; color:white;" onclick="renderMenuSeccion('psicos')">🧠 PSICOS</button>
            `;
        }

        function renderMenuSeccion(tipo) {
            fuenteActual = (tipo === 'teoria') ? datosTemas : datosPsicos;
            const app = document.getElementById('app');
            app.innerHTML = `<div class="btn-volver" onclick="renderInicio()">← VOLVER</div><h1>${tipo.toUpperCase()}</h1><div id="lista"></div>`;
            Object.keys(fuenteActual).forEach(id => {
                const b = document.createElement('button');
                b.className = 'btn-tema';
                b.innerHTML = `<span>${fuenteActual[id].n}</span> <span>→</span>`;
                b.onclick = () => verSubTests(id);
                document.getElementById('lista').appendChild(b);
            });
        }

        function verSubTests(id) {
            const app = document.getElementById('app');
            app.innerHTML = `<div class="btn-volver" onclick="renderMenuSeccion(fuenteActual === datosTemas ? 'teoria' : 'psicos')">← TEMAS</div><h2>${fuenteActual[id].n}</h2><div class="test-grid"></div>`;
            fuenteActual[id].tests.forEach((t, index) => {
                const b = document.createElement('button');
                b.className = 'btn-test';
                // CLAVE ÚNICA POR USUARIO PARA EL PROGRESO
                const nota = localStorage.getItem(`nota_${usuarioActual}_${id}_${index}`);
                if (nota) {
                    b.style.background = 'var(--success)';
                    b.innerHTML = `TEST ${index + 1}<br><small>${nota}%</small>`;
                } else { b.innerText = `TEST ${index + 1}`; }
                b.onclick = () => { ultimoTemaId = id; ultimoTestIdx = index; empezarTest(id, index); };
                app.querySelector('.test-grid').appendChild(b);
            });
        }

        function empezarTest(temaId, testIdx) {
            testActual = JSON.parse(JSON.stringify(fuenteActual[temaId].tests[testIdx].preguntas));
            falladas = []; aciertos = 0; indexPregunta = 0;
            verPregunta();
        }

        function verPregunta() {
            const app = document.getElementById('app');
            const p = testActual[indexPregunta];
            app.innerHTML = `
                <div class="card">
                    <small>Pregunta ${indexPregunta + 1}/${testActual.length}</small>
                    <div class="pregunta-texto">${p.q}</div>
                    <div id="ops">
                        ${p.ops.map((o, i) => `<div class="opcion" onclick="validar(${i},${p.c},this)">${o}</div>`).join('')}
                    </div>
                    <button id="nxt" class="btn-nav" style="width:100%; margin-top:15px;" onclick="siguiente()">Siguiente</button>
                </div>`;
        }

        function validar(s, c, el) {
            const p = el.parentNode; if (p.classList.contains('l')) return;
            p.classList.add('l');
            if (s === c) { el.classList.add('correcta'); aciertos++; }
            else { el.classList.add('error'); p.children[c].classList.add('correcta'); falladas.push(testActual[indexPregunta]); }
            document.getElementById('nxt').style.display = 'block';
        }

        function siguiente() {
            indexPregunta++;
            if (indexPregunta < testActual.length) verPregunta();
            else verResultados();
        }

        function verResultados() {
            const app = document.getElementById('app');
            const por = Math.round((aciertos / testActual.length) * 100);
            // GUARDAR NOTA ASOCIADA AL USUARIO
            localStorage.setItem(`nota_${usuarioActual}_${ultimoTemaId}_${ultimoTestIdx}`, por);
            
            app.innerHTML = `
                <div class="card" style="text-align:center">
                    <h2>${por}% Aciertos</h2>
                    <p>${aciertos} de ${testActual.length}</p>
                    <button class="btn-test" onclick="renderInicio()">Menú Principal</button>
                    ${falladas.length > 0 ? `<button class="btn-test" style="background:var(--error); margin-top:10px;" onclick="repasar()">Repasar Fallos (${falladas.length})</button>` : ''}
                </div>`;
        }

        function repasar() {
            testActual = JSON.parse(JSON.stringify(falladas));
            falladas = []; aciertos = 0; indexPregunta = 0;
            verPregunta();
        }

        window.onload = renderInicio;
    </script>
</body>
</html>
